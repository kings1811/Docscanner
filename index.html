<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#0c0c0c"/>
  <title>DocScanner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: #0c0c0c;
      color: #ddd8cc;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
      overscroll-behavior: none;
    }

    #header {
      padding: 12px 16px;
      border-bottom: 1px solid #1c1c1c;
      display: flex; align-items: center; gap: 10px;
      background: #0e0e0e; flex-shrink: 0;
    }
    #logo-box {
      width: 32px; height: 32px; background: #b45309;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    #app-name { font-size: 12px; font-weight: 700; letter-spacing: .18em; color: #d97706; }
    #app-sub  { font-size: 8px; color: #3f3f3f; letter-spacing: .12em; margin-top: 1px; }
    #new-btn  {
      display: none; background: transparent; border: 1px solid #2a2a2a;
      color: #555; padding: 5px 10px; cursor: pointer;
      font-size: 9px; letter-spacing: .12em; font-family: inherit;
    }

    #error-bar {
      display: none; background: #1a0000; border-bottom: 1px solid #5c1010;
      padding: 9px 16px; font-size: 11px; color: #f87171;
      letter-spacing: .04em; align-items: flex-start; gap: 8px;
    }
    #error-bar.visible { display: flex; }
    #error-icon  { color: #ef4444; flex-shrink: 0; }
    #error-text  { flex: 1; line-height: 1.5; }
    #error-close { background: transparent; border: none; color: #f87171; cursor: pointer; font-size: 16px; line-height: 1; flex-shrink: 0; }

    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* Camera screen */
    #cam-screen { flex: 1; display: flex; flex-direction: column; }
    #viewfinder { flex: 1; background: #000; position: relative; min-height: 260px; }
    #video-el   { width: 100%; height: 100%; object-fit: cover; display: none; }

    #cam-spinner {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 10px;
    }
    #spinner-ring {
      width: 24px; height: 24px;
      border: 2px solid #d97706; border-top-color: transparent;
      border-radius: 50%; animation: spin 1s linear infinite;
    }
    #spinner-label { color: #444; font-size: 9px; letter-spacing: .15em; }

    .corner { position: absolute; width: 20px; height: 20px; border-color: #d97706; border-style: solid; opacity: .4; }
    .corner.tl { top: 14px; left: 14px;   border-width: 2px 0 0 2px; }
    .corner.tr { top: 14px; right: 14px;  border-width: 2px 2px 0 0; }
    .corner.bl { bottom: 14px; left: 14px;  border-width: 0 0 2px 2px; }
    .corner.br { bottom: 14px; right: 14px; border-width: 0 2px 2px 0; }

    #flash { display: none; position: absolute; inset: 0; background: #fff; opacity: 0; pointer-events: none; }

    #page-badge {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,.72); padding: 4px 12px;
      border: 1px solid #2a2a2a;
      font-size: 10px; letter-spacing: .14em; color: #d97706; white-space: nowrap;
    }

    /* Tray */
    #tray-wrap { background: #0a0a0a; border-top: 1px solid #1a1a1a; flex-shrink: 0; }
    #tray-header { padding: 7px 14px 4px; display: flex; align-items: center; justify-content: space-between; }
    #tray-label { font-size: 8px; color: #333; letter-spacing: .14em; }
    #tray-clear {
      display: none; background: transparent; border: none; color: #5c1010;
      font-size: 8px; letter-spacing: .1em; cursor: pointer; font-family: inherit;
    }
    #tray {
      display: flex; gap: 6px; padding: 4px 14px 10px;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      min-height: 72px; align-items: center;
    }
    #tray::-webkit-scrollbar { height: 2px; }
    #tray::-webkit-scrollbar-track { background: #0a0a0a; }
    #tray::-webkit-scrollbar-thumb { background: #222; }
    #tray-empty { font-size: 9px; color: #272727; letter-spacing: .1em; white-space: nowrap; margin: auto; }

    .thumb-wrap { position: relative; flex-shrink: 0; width: 52px; height: 58px; }
    .thumb-img  { width: 52px; height: 52px; object-fit: cover; border: 1px solid #2a2a2a; display: block; }
    .thumb-num  {
      position: absolute; bottom: 0; left: 0; right: 0; text-align: center;
      font-size: 8px; color: #555; letter-spacing: .06em; background: #0a0a0a; padding: 1px 0;
    }
    .thumb-del {
      position: absolute; top: -5px; right: -5px;
      width: 16px; height: 16px; border-radius: 50%;
      background: #7f1d1d; border: none; color: #f87171;
      font-size: 10px; line-height: 1; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    /* Controls */
    #controls {
      padding: 12px 16px 20px; background: #0e0e0e;
      border-top: 1px solid #1a1a1a;
      display: flex; flex-direction: column; gap: 10px; flex-shrink: 0;
    }
    #hint { font-size: 9px; color: #333; text-align: center; letter-spacing: .08em; line-height: 1.8; }
    #btn-row { display: flex; gap: 8px; }

    #capture-btn {
      flex: 1; background: #d97706; color: #000; border: none;
      padding: 14px 8px; font-size: 11px; font-weight: 700;
      letter-spacing: .2em; cursor: pointer; font-family: inherit; transition: background .15s;
    }
    #capture-btn:disabled { background: #1a1a1a; color: #333; cursor: not-allowed; }
    #capture-btn:active:not(:disabled) { background: #b45309; }

    #extract-btn {
      display: none; flex: 1; background: transparent; color: #d97706;
      border: 2px solid #92400e; padding: 14px 8px; font-size: 11px; font-weight: 700;
      letter-spacing: .14em; cursor: pointer; font-family: inherit;
    }
    #extract-btn:active { background: #1a0f00; }

    /* Processing screen */
    #proc-screen {
      display: none; flex: 1; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 28px; padding: 32px 24px;
    }
    #proc-title   { font-size: 10px; color: #d97706; letter-spacing: .25em; text-align: center; margin-bottom: 5px; }
    #proc-warning { font-size: 9px; color: #2e2e2e; letter-spacing: .12em; text-align: center; }

    /* Batch progress */
    #batch-status {
      font-size: 11px; color: #d97706; letter-spacing: .1em;
      text-align: center; min-height: 18px;
    }

    #progress-wrap { width: 100%; max-width: 320px; }
    #progress-track { background: #1a1a1a; height: 3px; }
    #progress-fill  { background: linear-gradient(90deg, #92400e, #d97706); height: 100%; width: 0%; transition: width .4s ease; }
    #progress-meta  { display: flex; justify-content: space-between; margin-top: 7px; }
    #step-label { font-size: 10px; color: #3a3a3a; letter-spacing: .06em; max-width: 80%; }
    #step-pct   { font-size: 10px; color: #d97706; flex-shrink: 0; }

    /* Batch indicators */
    #batch-indicators { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; max-width: 320px; }
    .batch-pip {
      width: 10px; height: 10px;
      border: 1px solid #222; transition: all .3s;
    }
    .batch-pip.active   { border-color: #92400e; background: #1a0f00; }
    .batch-pip.done     { border-color: #d97706; background: #d97706; }

    /* Editor screen */
    #edit-screen { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    #toolbar {
      padding: 9px 14px; border-bottom: 1px solid #1a1a1a;
      display: flex; align-items: center; gap: 8px;
      background: #0e0e0e; flex-shrink: 0;
    }
    #toolbar-label { font-size: 8px; color: #333; letter-spacing: .12em; flex: 1; }
    .dl-btn {
      background: transparent; color: #d97706; border: 1px solid #422006;
      padding: 6px 11px; font-size: 9px; font-weight: 700;
      letter-spacing: .14em; cursor: pointer; font-family: inherit;
    }
    .dl-btn.primary { background: #b45309; color: #fff8f0; border-color: #b45309; }

    #editor {
      flex: 1; background: #0c0c0c; color: #ddd8cc;
      border: none; outline: none; padding: 18px 16px;
      font-size: 14px; line-height: 1.8;
      font-family: Georgia, 'Times New Roman', serif;
      resize: none; letter-spacing: .01em;
      -webkit-overflow-scrolling: touch;
    }
    #edit-footer {
      padding: 5px 16px; border-top: 1px solid #141414;
      background: #0e0e0e; display: flex; justify-content: flex-end; flex-shrink: 0;
    }
    #word-count { font-size: 8px; color: #252525; letter-spacing: .1em; }

    @keyframes spin      { to { transform: rotate(360deg); } }
    @keyframes flashAnim { 0%{opacity:.85} 100%{opacity:0} }

    ::-webkit-scrollbar       { width: 3px; }
    ::-webkit-scrollbar-track { background: #0c0c0c; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; }
  </style>
</head>
<body>

  <div id="header">
    <div id="logo-box">&#x25EB;</div>
    <div style="flex:1">
      <div id="app-name">DOCSCANNER</div>
      <div id="app-sub">PHOTO &rarr; DOCUMENT ENGINE</div>
    </div>
    <button id="new-btn" onclick="resetApp()">&#xFF0B; NEW</button>
  </div>

  <div id="error-bar">
    <span id="error-icon">&#9888;</span>
    <span id="error-text"></span>
    <button id="error-close" onclick="clearError()">&times;</button>
  </div>

  <div id="main">

    <!-- Camera screen -->
    <div id="cam-screen">
      <div id="viewfinder">
        <video id="video-el" autoplay muted playsinline></video>
        <div id="cam-spinner">
          <div id="spinner-ring"></div>
          <span id="spinner-label">ACQUIRING CAMERA</span>
        </div>
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
        <div id="flash"></div>
        <div id="page-badge">PAGE 1</div>
      </div>

      <div id="tray-wrap">
        <div id="tray-header">
          <span id="tray-label">CAPTURED PAGES</span>
          <button id="tray-clear" onclick="clearAll()">&#9249; CLEAR ALL</button>
        </div>
        <div id="tray">
          <span id="tray-empty">NO PAGES CAPTURED YET</span>
        </div>
      </div>

      <div id="controls">
        <p id="hint">AIM AT ONE PAGE OF THE DOCUMENT ON YOUR SCREEN.<br>TAP CAPTURE FOR EACH PAGE IN ORDER.</p>
        <div id="btn-row">
          <button id="capture-btn" disabled onclick="capturePhoto()">&#9679;&nbsp;CAPTURE PAGE</button>
          <button id="extract-btn" onclick="startExtraction()">&#10003;&nbsp;EXTRACT DOCUMENT</button>
        </div>
      </div>
    </div>

    <!-- Processing screen -->
    <div id="proc-screen">
      <div>
        <div id="proc-title">EXTRACTING DOCUMENT</div>
        <div id="proc-warning">DO NOT CLOSE THIS SCREEN</div>
      </div>
      <div id="batch-status"></div>
      <div id="progress-wrap">
        <div id="progress-track"><div id="progress-fill"></div></div>
        <div id="progress-meta">
          <span id="step-label"></span>
          <span id="step-pct">0%</span>
        </div>
      </div>
      <div id="batch-indicators"></div>
    </div>

    <!-- Editor screen -->
    <div id="edit-screen">
      <div id="toolbar">
        <span id="toolbar-label">EXTRACTED DOCUMENT &mdash; TAP TO EDIT</span>
        <button class="dl-btn" onclick="downloadAs('txt')">&#8595;TXT</button>
        <button class="dl-btn" onclick="downloadAs('pdf')">&#8595;PDF</button>
        <button class="dl-btn primary" onclick="downloadAs('doc')">&#8595;DOC</button>
      </div>
      <textarea id="editor" spellcheck="true" oninput="updateCount()"></textarea>
      <div id="edit-footer">
        <span id="word-count">0 CHARS &middot; 0 WORDS</span>
      </div>
    </div>

  </div>

<script>
  var PROXY_URL  = "https://docscanner-proxy.kd-kingshuk.workers.dev/";
  var BATCH_SIZE = 4; // pages per API call — keeps each call under 30s

  var stream = null;
  var photos = [];

  initCam();

  /* ── Camera ── */
  function initCam() {
    document.getElementById("cam-spinner").style.display = "flex";
    document.getElementById("video-el").style.display    = "none";
    document.getElementById("capture-btn").disabled      = true;

    navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" }, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    }).then(function(s) {
      stream = s;
      var v = document.getElementById("video-el");
      v.srcObject = stream;
      v.onloadedmetadata = function() {
        v.play();
        document.getElementById("cam-spinner").style.display = "none";
        v.style.display = "block";
        document.getElementById("capture-btn").disabled = false;
      };
    }).catch(function() {
      showError("Camera permission required. Tap the lock icon in Chrome's address bar, allow Camera, then reload.");
    });
  }

  /* ── Capture ── */
  function capturePhoto() {
    var v = document.getElementById("video-el");
    if (!v || !v.videoWidth) return;

    var canvas = document.createElement("canvas");
    canvas.width  = v.videoWidth;
    canvas.height = v.videoHeight;
    canvas.getContext("2d").drawImage(v, 0, 0);

    var dataUrl = canvas.toDataURL("image/jpeg", 0.88);
    photos.push(dataUrl.split(",")[1]);

    triggerFlash();
    addThumb(dataUrl, photos.length);
    updatePageBadge();
    updateTrayState();
    clearError();
  }

  function triggerFlash() {
    var f = document.getElementById("flash");
    f.style.display = "block"; f.style.animation = "none";
    f.offsetHeight;
    f.style.animation = "flashAnim 0.35s ease-out forwards";
    setTimeout(function() { f.style.display = "none"; }, 380);
  }

  function addThumb(dataUrl, num) {
    var tray  = document.getElementById("tray");
    var empty = document.getElementById("tray-empty");
    if (empty) empty.style.display = "none";

    var wrap  = document.createElement("div");  wrap.className = "thumb-wrap"; wrap.id = "thumb-" + num;
    var img   = document.createElement("img");  img.className  = "thumb-img";  img.src = dataUrl;
    var label = document.createElement("div");  label.className = "thumb-num"; label.textContent = "P" + num;
    var del   = document.createElement("button"); del.className = "thumb-del"; del.innerHTML = "&times;";
    del.setAttribute("data-num", num);
    del.onclick = function() { deletePhoto(parseInt(this.getAttribute("data-num"))); };

    wrap.appendChild(img); wrap.appendChild(label); wrap.appendChild(del);
    tray.appendChild(wrap);
    tray.scrollLeft = tray.scrollWidth;
  }

  function deletePhoto(num) {
    var wrap   = document.getElementById("thumb-" + num);
    if (!wrap) return;
    var thumbs = document.getElementById("tray").querySelectorAll(".thumb-wrap");
    var idx    = -1;
    for (var i = 0; i < thumbs.length; i++) { if (thumbs[i].id === "thumb-" + num) { idx = i; break; } }
    if (idx === -1) return;
    photos.splice(idx, 1);
    wrap.remove();
    renumberThumbs();
    updatePageBadge();
    updateTrayState();
  }

  function renumberThumbs() {
    document.getElementById("tray").querySelectorAll(".thumb-wrap").forEach(function(w, i) {
      var n = i + 1;
      w.id = "thumb-" + n;
      w.querySelector(".thumb-num").textContent = "P" + n;
      w.querySelector(".thumb-del").setAttribute("data-num", n);
    });
  }

  function clearAll() {
    photos = [];
    document.getElementById("tray").innerHTML = '<span id="tray-empty">NO PAGES CAPTURED YET</span>';
    updatePageBadge(); updateTrayState();
  }

  function updatePageBadge() {
    document.getElementById("page-badge").textContent = "PAGE " + (photos.length + 1);
  }

  function updateTrayState() {
    var has = photos.length > 0;
    document.getElementById("tray-clear").style.display  = has ? "block" : "none";
    document.getElementById("extract-btn").style.display = has ? "block" : "none";
    document.getElementById("hint").textContent = has
      ? photos.length + " PAGE" + (photos.length > 1 ? "S" : "") + " CAPTURED. ADD MORE OR TAP EXTRACT."
      : "AIM AT ONE PAGE OF THE DOCUMENT ON YOUR SCREEN.\nTAP CAPTURE FOR EACH PAGE IN ORDER.";
  }

  /* ── Progress ── */
  function setProgress(pct, label) {
    document.getElementById("progress-fill").style.width = pct + "%";
    document.getElementById("step-pct").textContent      = pct + "%";
    document.getElementById("step-label").textContent    = label;
  }

  function setBatchStatus(msg) {
    document.getElementById("batch-status").textContent = msg;
  }

  function buildBatchIndicators(total) {
    var box = document.getElementById("batch-indicators");
    box.innerHTML = "";
    for (var i = 0; i < total; i++) {
      var pip = document.createElement("div");
      pip.className = "batch-pip";
      pip.id = "bpip-" + i;
      box.appendChild(pip);
    }
  }

  function setBatchPip(i, state) { // state: 'active' | 'done'
    var pip = document.getElementById("bpip-" + i);
    if (!pip) return;
    pip.classList.remove("active", "done");
    pip.classList.add(state);
  }

  /* ── Core API call for one batch ── */
  function callAPI(batchPhotos, batchNum, totalBatches, isFirst, isLast) {
    var context = "";
    if (totalBatches > 1) {
      context = "This is batch " + batchNum + " of " + totalBatches + " batches. "
        + (isFirst ? "This is the START of the document. " : "")
        + (isLast  ? "This is the END of the document. "   : "")
        + (!isFirst && !isLast ? "This is a MIDDLE section. " : "")
        + "Extract the text from these pages exactly. Do not add summaries, headings, or section markers.";
    } else {
      context = "Extract all text from these " + batchPhotos.length + " page(s).";
    }

    var content = [{
      type: "text",
      text: "You are a precision document OCR engine. " + context
        + "\n\nRULES:\n"
        + "1. If the images do NOT clearly show a text document on a screen — output exactly: ERROR:NOT_A_DOCUMENT\n"
        + "2. Extract ALL visible text in reading order. Preserve headings, paragraphs, bullet points, numbered lists. Represent tables as plain text. Do not repeat content.\n"
        + "3. Output ONLY the raw document text. No preamble, no page labels, no markdown fences."
    }];

    batchPhotos.forEach(function(b64) {
      content.push({ type: "image", source: { type: "base64", media_type: "image/jpeg", data: b64 } });
    });

    return fetch(PROXY_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 8000,
        messages: [{ role: "user", content: content }]
      })
    }).then(function(res) {
      if (!res.ok) {
        return res.json().catch(function() { return {}; }).then(function(e) {
          throw new Error("API error " + res.status + ": " + ((e.error && e.error.message) || res.statusText));
        });
      }
      return res.json();
    }).then(function(data) {
      var text = "";
      if (data.content) {
        for (var i = 0; i < data.content.length; i++) {
          if (data.content[i].type === "text") { text = data.content[i].text.trim(); break; }
        }
      }
      if (!text || text.indexOf("NOT_A_DOCUMENT") !== -1) {
        throw new Error("NOT_A_DOCUMENT");
      }
      return text;
    });
  }

  /* ── Main extraction with batching ── */
  async function startExtraction() {
    if (!photos.length) { showError("Capture at least one page first."); return; }
    if (stream) stream.getTracks().forEach(function(t) { t.stop(); });

    showProcessing();

    var total       = photos.length;
    var numBatches  = Math.ceil(total / BATCH_SIZE);
    var results     = [];

    buildBatchIndicators(numBatches);
    setProgress(0, "");
    setBatchStatus("PROCESSING " + total + " PAGE" + (total > 1 ? "S" : "") + " IN " + numBatches + " BATCH" + (numBatches > 1 ? "ES" : ""));

    try {
      for (var b = 0; b < numBatches; b++) {
        var start      = b * BATCH_SIZE;
        var end        = Math.min(start + BATCH_SIZE, total);
        var batch      = photos.slice(start, end);
        var isFirst    = (b === 0);
        var isLast     = (b === numBatches - 1);
        var pagesLabel = "PAGES " + (start + 1) + "–" + end;

        setBatchPip(b, "active");
        setBatchStatus("PROCESSING " + pagesLabel + " (BATCH " + (b + 1) + " OF " + numBatches + ")");
        setProgress(Math.round((b / numBatches) * 90), "OCR on " + pagesLabel.toLowerCase() + "...");

        var text = await callAPI(batch, b + 1, numBatches, isFirst, isLast);
        results.push(text);
        setBatchPip(b, "done");
      }

      setProgress(95, "Stitching batches together...");
      setBatchStatus("MERGING ALL SECTIONS...");

      var fullText = results.join("\n\n");

      // If more than 1 batch, ask Claude to clean up the joins
      if (numBatches > 1) {
        var mergeRes = await fetch(PROXY_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-6",
            max_tokens: 8000,
            messages: [{
              role: "user",
              content: "The following text was extracted from a multi-page document in batches. Join it into one clean, coherent document. Fix any broken sentences at batch boundaries. Remove any duplicate lines. Preserve all original content, formatting, headings, and lists. Output ONLY the final document text — no commentary, no markdown fences.\n\n" + fullText
            }]
          })
        });

        if (mergeRes.ok) {
          var mergeData = await mergeRes.json();
          if (mergeData.content) {
            for (var i = 0; i < mergeData.content.length; i++) {
              if (mergeData.content[i].type === "text") {
                fullText = mergeData.content[i].text.trim();
                break;
              }
            }
          }
        }
        // If merge call fails, we still have the raw joined text — just use it
      }

      setProgress(100, "Done.");
      setBatchStatus("COMPLETE — " + total + " PAGE" + (total > 1 ? "S" : "") + " EXTRACTED");

      document.getElementById("editor").value = fullText;
      updateCount();
      showEditor();

    } catch(e) {
      if (e.message === "NOT_A_DOCUMENT") {
        showError("Photos don't appear to show a document on a screen. Make sure you're photographing text on a laptop or monitor.");
      } else {
        showError("Extraction failed: " + (e.message || "Unknown error."));
      }
      showCamera();
      initCam();
    }
  }

  /* ── Screen switching ── */
  function showProcessing() {
    document.getElementById("cam-screen").style.display  = "none";
    document.getElementById("proc-screen").style.display = "flex";
    document.getElementById("edit-screen").style.display = "none";
    document.getElementById("new-btn").style.display     = "none";
  }
  function showEditor() {
    document.getElementById("cam-screen").style.display  = "none";
    document.getElementById("proc-screen").style.display = "none";
    document.getElementById("edit-screen").style.display = "flex";
    document.getElementById("new-btn").style.display     = "block";
  }
  function showCamera() {
    document.getElementById("cam-screen").style.display  = "flex";
    document.getElementById("proc-screen").style.display = "none";
    document.getElementById("edit-screen").style.display = "none";
    document.getElementById("new-btn").style.display     = "none";
  }

  /* ── Editor ── */
  function updateCount() {
    var txt   = document.getElementById("editor").value;
    var words = txt.trim() ? txt.trim().split(/\s+/).length : 0;
    document.getElementById("word-count").textContent =
      txt.length.toLocaleString() + " CHARS \u00B7 " + words.toLocaleString() + " WORDS";
  }

  function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  function downloadAs(fmt) {
    var text = document.getElementById("editor").value;
    if (fmt === "txt") {
      dl(new Blob([text], { type: "text/plain;charset=utf-8" }), "document.txt");
    } else if (fmt === "pdf") {
      var w = window.open("", "_blank");
      if (!w) { showError("Allow popups in Chrome to export PDF."); return; }
      w.document.write("<!DOCTYPE html><html><head><meta charset='utf-8'><style>body{font-family:Georgia,serif;max-width:170mm;margin:25mm auto;font-size:11pt;line-height:1.7;color:#111}pre{white-space:pre-wrap;font-family:inherit;margin:0}@media print{body{margin:0;max-width:100%}}</style></head><body><pre>" + esc(text) + "</pre></body></html>");
      w.document.close();
      setTimeout(function() { w.focus(); w.print(); }, 600);
    } else if (fmt === "doc") {
      var html = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Document</title><style>body{font-family:Calibri,sans-serif;font-size:11pt;line-height:1.5}pre{white-space:pre-wrap;font-family:Calibri,sans-serif;font-size:11pt}</style></head><body><pre>" + esc(text) + "</pre></body></html>";
      dl(new Blob(["\ufeff", html], { type: "application/msword" }), "document.doc");
    }
  }

  function dl(blob, name) {
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = name; a.click();
    setTimeout(function() { URL.revokeObjectURL(a.href); }, 2000);
  }

  function resetApp() {
    photos = [];
    document.getElementById("editor").value = "";
    updateCount();
    document.getElementById("batch-indicators").innerHTML = "";
    setBatchStatus("");
    setProgress(0, "");
    document.getElementById("tray").innerHTML = '<span id="tray-empty">NO PAGES CAPTURED YET</span>';
    updatePageBadge(); updateTrayState();
    showCamera(); initCam();
  }

  function showError(msg) {
    document.getElementById("error-text").textContent = msg;
    document.getElementById("error-bar").classList.add("visible");
  }
  function clearError() {
    document.getElementById("error-bar").classList.remove("visible");
  }
</script>
</body>
</html>
